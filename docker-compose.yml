services:
  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/clickhouse_init.sql:/docker-entrypoint-initdb.d/clickhouse_init.sql:ro
    environment:
      CLICKHOUSE_DB: stocks
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 8

  # =============================================================================
  # PRODUCER
  # =============================================================================

  crypto-producer:
    build:
      context: ./src/production/producer
      dockerfile: Dockerfile.crypto-producer
    container_name: crypto-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: crypto_ticks_raw
    profiles:
      - crypto

  # =============================================================================
  # CONSUMER
  # =============================================================================

  spark-streaming:
    build:
      context: ./src/production/consumer
      dockerfile: Dockerfile.spark-consumer
    container_name: spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: crypto_ticks_raw
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DATABASE: stocks
      CLICKHOUSE_RAW_TABLE: crypto_ticks_raw
      CLICKHOUSE_AGG_TABLE: crypto_metrics_1m
      CHECKPOINT_DIR_RAW: /checkpoints/raw_ticks
      CHECKPOINT_DIR_AGG: /checkpoints/windowed_agg
    volumes:
      - spark_checkpoints:/checkpoints
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,com.clickhouse:clickhouse-jdbc:0.6.0,org.apache.httpcomponents.client5:httpclient5:5.3.1
      spark_streaming_clickhouse_consumer.py
    profiles:
      - spark_streaming

  # =============================================================================
  # DASHBOARD
  # =============================================================================

  web-dashboard:
    build:
      context: ./src/production/dashboard
      dockerfile: Dockerfile.web-dashboard
    container_name: web-dashboard
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DATABASE: stocks
      CLICKHOUSE_RAW_TABLE: crypto_ticks_raw
      CLICKHOUSE_AGG_TABLE: crypto_metrics_1m
      DASHBOARD_MODE: ${DASHBOARD_MODE:-crypto}
    ports:
      - "8502:8502"
    profiles:
      - web

volumes:
  clickhouse_data:
  spark_checkpoints:
